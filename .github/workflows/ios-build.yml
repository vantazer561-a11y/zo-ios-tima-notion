name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: TimaNotion
      CONFIGURATION: Release
      DERIVED: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Print versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app for iOS device
        run: |
          set -o pipefail
          xcodebuild \
            -project TimaNotion.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH="$(find $DERIVED/Build/Products -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Built .app not found"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found: $APP_PATH"

      - name: Package unsigned IPA
        run: |
          mkdir -p ipa_build/Payload
          cp -R "$APP_PATH" ipa_build/Payload/
          cd ipa_build
          zip -qry "../TimaNotion-unsigned.ipa" Payload
          cd ..
          ls -lh TimaNotion-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimaNotion-unsigned-ipa
          path: TimaNotion-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
