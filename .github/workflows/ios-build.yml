name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Print versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build .app for device (unsigned, Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project TimaNotion.xcodeproj \
            -scheme TimaNotion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            -archivePath build/TimaNotion.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="build/TimaNotion.xcarchive/Products/Applications/TimaNotion.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::TimaNotion.app не найден по пути $APP_PATH"
            ls -la build/TimaNotion.xcarchive/Products/Applications/ || true
            exit 1
          fi
          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/
          cd artifacts
          zip -qry "TimaNotion-unsigned.ipa" Payload
          rm -rf Payload
          ls -lh TimaNotion-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: TimaNotion-unsigned-ipa
          path: artifacts/TimaNotion-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
