name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build TimaNotion (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Print Xcode & Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulators
        run: xcrun simctl list devices available | head -40

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project TimaNotion.xcodeproj \
            -scheme TimaNotion \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build | xcpretty || (xcodebuild \
              -project TimaNotion.xcodeproj \
              -scheme TimaNotion \
              -configuration Debug \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=YES \
              build)

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TimaNotion-Simulator-app
          path: build/Build/Products/Debug-iphonesimulator/TimaNotion.app
          if-no-files-found: warn
          retention-days: 14
