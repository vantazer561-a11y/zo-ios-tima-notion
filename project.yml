name: ZoNotes
options:
  bundleIdPrefix: com.tima
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: ru
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ZoNotes:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ZoNotes
        excludes:
          - "**/.DS_Store"
    resources:
      - path: ZoNotes/Resources/Assets.xcassets
      - path: ZoNotes/Models/ZoNotes.xcdatamodeld
    info:
      path: ZoNotes/Resources/Info.plist
      properties:
        CFBundleDisplayName: ZoNotes
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "ZoNotes использует камеру для вставки изображений в заметки."
        NSPhotoLibraryUsageDescription: "ZoNotes использует фото для вставки изображений в заметки."
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.tima.zonotes
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: '"ZoNotes/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
