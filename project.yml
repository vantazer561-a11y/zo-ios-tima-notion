name: TimaNotion
options:
  bundleIdPrefix: com.tima
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: ru
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  TimaNotion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TimaNotion
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tima.timanotion
        PRODUCT_NAME: TimaNotion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: TimaNotion/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_ASSET_PATHS: "\"TimaNotion/Resources/Preview Content\""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
